name: Bug report
labels: [bug, ecoute]
body:
  - type: textarea
    attributes:
      label: Description
      description: Describe what happened and what you expected.
      placeholder: "What did you do and what went wrong?"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Urgency
      options:
        - Low
        - Medium
        - High

